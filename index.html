<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
    <title>ANTARES FITNESS — Sistema</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Estilos base para evitar pantalla en blanco */
        :root { --navy:#0A1520; --gold:#C8942A; --white:#F8F9FA; }
        body { background: var(--navy); color: var(--white); margin: 0; font-family: sans-serif; }
        .screen { display: none; min-height: 100vh; flex-direction: column; }
        .screen.active { display: flex; }
        /* Pega aquí el resto de tus estilos del archivo original */
    </style>
</head>
<body>

<div id="screen-login" class="screen active">
    <div style="padding: 50px; text-align: center;">
        <h2 style="color:var(--gold)">ANTARES FITNESS</h2>
        <p>Cargando sistema...</p>
        <div id="status-msg"></div>
    </div>
</div>

<script>
// REEMPLAZA ESTO CON TUS DATOS REALES DE SUPABASE
const SB_URL = "TU_URL_AQUI"; 
const SB_KEY = "TU_KEY_AQUI";

try {
    const supabase = supabase.createClient(SB_URL, SB_KEY);
    document.getElementById('status-msg').innerHTML = "✅ Conexión establecida";
    
    // Aquí iría tu lógica de navegación:
    // showScreen('screen-login');
} catch (error) {
    document.getElementById('status-msg').innerHTML = "❌ Error de configuración: " + error.message;
}

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}
</script>
</body>
</html>
